<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智读 · ZhiDu — 图书知识快学</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg:      #0E0C0B;
  --s1:      #1A1714;
  --s2:      #221F1B;
  --s3:      #2C2924;
  --s4:      #363028;
  --border:  #3D3730;
  --border2: #524C44;
  --gold:    #D4A843;
  --gold-d:  #A07B25;
  --gold-l:  #F0CC7A;
  --gold-bg: rgba(212,168,67,.08);
  --blue:    #4E7FAA;
  --blue-l:  #7AAAD4;
  --t1:      #EDE6DC;
  --t2:      #B8AEA0;
  --t3:      #7A7268;
  --ok:      #5B9E73;
  --err:     #C4524A;
  --r:       6px;
  --r2:      10px;
  --r3:      14px;
  --sidebar-w: 268px;
  --header-h: 52px;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
  font-size: 15px; line-height: 1.65;
  color: var(--t1); background: var(--bg);
  overflow: hidden;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input, textarea { font-family: inherit; outline: none; }
svg { display: block; flex-shrink: 0; }

/* ===== SCREEN SYSTEM ===== */
#app { width: 100%; height: 100%; position: relative; overflow: hidden; }
.screen {
  position: absolute; inset: 0;
  display: none; opacity: 0;
  transition: opacity .2s ease;
}
.screen.active { display: flex; flex-direction: column; opacity: 1; }
.screen.entering { animation: fadeIn .25s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ===== SHARED COMPONENTS ===== */
/* Top bar */
.topbar {
  height: var(--header-h); flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; border-bottom: 1px solid var(--border);
  background: var(--s1);
}
.topbar-logo {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; color: var(--gold);
  letter-spacing: -.5px; white-space: nowrap;
}
.topbar-logo span { color: var(--t3); font-weight: 400; font-size: 13px; margin-left: 8px; }

/* Back btn */
.btn-back {
  display: flex; align-items: center; gap: 6px;
  color: var(--t3); font-size: 13px;
  padding: 5px 10px; border-radius: var(--r);
  background: transparent; transition: all .15s;
}
.btn-back:hover { background: var(--s3); color: var(--t1); }

/* Tag */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 99px; font-size: 12px;
  font-weight: 500; background: var(--s3); color: var(--t2);
}
.tag.ai { background: rgba(78,127,170,.15); color: var(--blue-l); }
.tag.cat { background: var(--gold-bg); color: var(--gold); }

/* Btn */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--r);
  font-size: 14px; font-weight: 500;
  transition: all .15s; cursor: pointer;
}
.btn-primary { background: var(--gold); color: #0E0C0B; }
.btn-primary:hover { background: var(--gold-l); }
.btn-ghost {
  background: transparent; color: var(--t2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--s3); color: var(--t1); border-color: var(--border2); }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* Loading spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Skeleton */
.skel {
  background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%);
  background-size: 200% 100%;
  border-radius: var(--r);
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--s3); color: var(--t1);
  border: 1px solid var(--border2); border-radius: var(--r2);
  padding: 10px 20px; font-size: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  opacity: 0; transition: all .25s ease;
  pointer-events: none; z-index: 9999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== SCREEN: HOME ===== */
#screen-home { background: var(--bg); overflow-y: auto; }

.home-header {
  padding: 48px 24px 32px;
  text-align: center;
}
.home-logo {
  font-family: 'Playfair Display', serif;
  font-size: 38px; font-weight: 700; color: var(--gold);
  letter-spacing: -1px; margin-bottom: 8px;
}
.home-logo-en { color: var(--t3); font-weight: 400; }
.home-tagline {
  color: var(--t2); font-size: 16px; font-weight: 300;
}

/* Search bar */
.search-wrap {
  max-width: 600px; margin: 0 auto 40px;
  padding: 0 24px;
}
.search-box {
  display: flex; align-items: center; gap: 0;
  background: var(--s1); border: 1.5px solid var(--border);
  border-radius: var(--r3); overflow: hidden;
  transition: border-color .15s;
}
.search-box:focus-within { border-color: var(--gold); }
.search-icon { padding: 0 14px; color: var(--t3); flex-shrink: 0; }
.search-input {
  flex: 1; background: transparent; border: none;
  color: var(--t1); font-size: 16px;
  padding: 14px 0; min-width: 0;
}
.search-input::placeholder { color: var(--t3); }
.search-btn {
  background: var(--gold); color: #0E0C0B;
  font-weight: 600; font-size: 14px;
  padding: 0 20px; height: 100%;
  border-radius: 0; transition: background .15s;
  white-space: nowrap;
}
.search-btn:hover { background: var(--gold-l); }
.search-hints {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-top: 12px;
}
.search-hint {
  background: var(--s2); border: 1px solid var(--border);
  color: var(--t2); font-size: 13px;
  padding: 4px 12px; border-radius: 99px; cursor: pointer;
  transition: all .15s;
}
.search-hint:hover { background: var(--s3); color: var(--t1); border-color: var(--gold); }

/* History */
.history-section {
  max-width: 800px; margin: 0 auto;
  padding: 0 24px 40px;
}
.section-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--t3); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.history-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 16px;
  cursor: pointer; transition: all .15s;
  display: flex; flex-direction: column; gap: 8px;
}
.history-card:hover { border-color: var(--border2); background: var(--s2); transform: translateY(-1px); }
.history-card-cover {
  width: 36px; height: 50px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: rgba(255,255,255,.8);
  flex-shrink: 0; font-weight: 700;
}
.history-card-title {
  font-weight: 600; font-size: 14px; line-height: 1.4;
  color: var(--t1); display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.history-card-meta { font-size: 12px; color: var(--t3); }
.history-empty {
  grid-column: 1/-1;
  text-align: center; padding: 32px;
  color: var(--t3); font-size: 14px;
}

/* Upload hint (P1 占位) */
.upload-hint {
  max-width: 800px; margin: 0 auto 32px;
  padding: 0 24px;
}
.upload-box {
  border: 1.5px dashed var(--border); border-radius: var(--r2);
  padding: 20px; text-align: center; color: var(--t3); font-size: 13px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.upload-box .p1-badge {
  background: var(--s3); color: var(--t3);
  font-size: 11px; padding: 2px 7px; border-radius: 99px;
  font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
}

/* ===== SCREEN: SEARCH LOADING ===== */
#screen-loading {
  align-items: center; justify-content: center; gap: 16px;
  background: var(--bg);
}
.loading-icon { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.loading-icon .spinner { width: 32px; height: 32px; }
.loading-text { color: var(--t2); font-size: 15px; }
.loading-sub { color: var(--t3); font-size: 13px; margin-top: 4px; text-align: center; }

/* ===== SCREEN: RESULTS ===== */
#screen-results { background: var(--bg); }
.results-body {
  flex: 1; overflow-y: auto;
  padding: 20px 24px 40px;
  max-width: 720px; width: 100%; margin: 0 auto;
}
.results-meta {
  font-size: 13px; color: var(--t3); margin-bottom: 20px;
}
.results-meta strong { color: var(--t2); }

/* AI fallback notice */
.ai-notice {
  background: rgba(78,127,170,.08); border: 1px solid rgba(78,127,170,.25);
  border-radius: var(--r2); padding: 12px 16px;
  font-size: 13px; color: var(--blue-l);
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 16px;
}

.result-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 16px 20px;
  cursor: pointer; transition: all .15s; margin-bottom: 10px;
  display: flex; gap: 16px; align-items: flex-start;
}
.result-card:hover { border-color: var(--gold); background: var(--s2); }
.result-cover {
  width: 44px; height: 62px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 22px;
  color: rgba(255,255,255,.8); font-weight: 700; flex-shrink: 0;
}
.result-info { flex: 1; min-width: 0; }
.result-title { font-weight: 600; font-size: 16px; color: var(--t1); margin-bottom: 4px; }
.result-author { font-size: 13px; color: var(--t3); margin-bottom: 8px; }
.result-desc {
  font-size: 13px; color: var(--t2); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.result-tags { display: flex; gap: 6px; margin-top: 8px; }

/* ===== SCREEN: DETAIL ===== */
#screen-detail { background: var(--bg); }
.detail-body {
  flex: 1; display: flex; overflow: hidden;
}

/* Sidebar (outline) */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--s1); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-book-info {
  padding: 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-book-cover {
  width: 36px; height: 50px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 18px;
  font-weight: 700; color: rgba(255,255,255,.8);
  margin-bottom: 10px;
}
.sidebar-book-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 600; color: var(--t1);
  line-height: 1.35; margin-bottom: 4px;
}
.sidebar-book-author { font-size: 12px; color: var(--t3); }

.sidebar-outline-head {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: space-between;
}
.sidebar-outline-head-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--t3);
}
.select-count {
  font-size: 12px; color: var(--gold);
  background: var(--gold-bg); padding: 2px 8px; border-radius: 99px;
}

.outline-tree {
  flex: 1; overflow-y: auto; padding: 6px 0;
}

/* Outline generating skeleton */
.outline-skel { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }
.outline-skel-item { display: flex; gap: 8px; align-items: center; }
.outline-skel-item .skel { height: 14px; }

/* Chapter row */
.ch-row {
  display: flex; align-items: center; gap: 0;
  padding: 0 8px 0 12px; min-height: 36px;
  cursor: pointer; transition: background .12s;
  border-radius: 4px; margin: 1px 4px;
}
.ch-row:hover { background: var(--s3); }
.ch-row.selected { background: var(--gold-bg); }
.ch-row.selected .ch-title { color: var(--gold-l); }

.ch-expand {
  width: 20px; height: 20px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3); transition: transform .15s;
}
.ch-expand.open { transform: rotate(90deg); }
.ch-expand.leaf { opacity: 0; pointer-events: none; }

.ch-checkbox {
  width: 16px; height: 16px; flex-shrink: 0;
  border: 1.5px solid var(--border2); border-radius: 3px;
  background: transparent; margin: 0 8px 0 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; cursor: pointer;
}
.ch-checkbox.checked {
  background: var(--gold); border-color: var(--gold);
}
.ch-checkbox.indeterminate {
  background: var(--gold-bg); border-color: var(--gold);
}

.ch-title {
  flex: 1; font-size: 13px; color: var(--t2);
  line-height: 1.4; padding: 6px 0;
  transition: color .12s;
}
.ch-row.chapter .ch-title { font-weight: 600; color: var(--t1); font-size: 13.5px; }

/* Sub-sections */
.ch-children { display: none; }
.ch-children.open { display: block; }
.ch-children .ch-row { padding-left: 32px; }

/* Content area */
.content-area {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
}

/* Tab bar */
.tab-bar {
  flex-shrink: 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 0;
  background: var(--s1);
}
.tab {
  padding: 14px 16px; font-size: 14px; font-weight: 500; color: var(--t3);
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .15s; white-space: nowrap;
  background: transparent;
}
.tab:hover { color: var(--t1); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-spacer { flex: 1; }
.tab-actions {
  display: flex; gap: 8px; align-items: center;
}

/* Content main */
.content-main {
  flex: 1; overflow-y: auto;
  padding: 24px 28px 32px;
}

/* Empty state */
.content-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 12px;
  color: var(--t3); text-align: center;
}
.content-empty-icon { font-size: 40px; opacity: .4; }
.content-empty h3 { font-size: 16px; color: var(--t2); font-weight: 500; }
.content-empty p { font-size: 13px; max-width: 260px; line-height: 1.5; }

/* Insights panel */
.insights-panel {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 16px 20px;
  margin-bottom: 20px; display: none;
}
.insights-panel.visible { display: block; }
.insights-panel-title {
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--t3); margin-bottom: 14px;
}
.insights-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.insights-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
.insights-label { font-size: 12px; color: var(--t3); font-weight: 500; }
.style-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.style-pill {
  padding: 5px 12px; border-radius: 99px; font-size: 13px;
  border: 1.5px solid var(--border2); color: var(--t2);
  cursor: pointer; transition: all .15s; background: transparent;
}
.style-pill:hover { border-color: var(--gold); color: var(--t1); }
.style-pill.active { border-color: var(--gold); background: var(--gold-bg); color: var(--gold-l); }
.style-custom-input {
  background: var(--s1); border: 1.5px solid var(--border);
  color: var(--t1); border-radius: var(--r); padding: 7px 12px;
  font-size: 13px; width: 100%; transition: border-color .15s;
  margin-top: 6px;
}
.style-custom-input:focus { border-color: var(--gold); }
.style-custom-input::placeholder { color: var(--t3); }

.word-count-wrap {
  display: flex; align-items: center; gap: 8px;
}
.word-count-input {
  background: var(--s1); border: 1.5px solid var(--border);
  color: var(--t1); border-radius: var(--r); padding: 7px 12px;
  font-size: 14px; width: 90px; transition: border-color .15s;
  text-align: center;
}
.word-count-input:focus { border-color: var(--gold); }
.word-count-unit { font-size: 13px; color: var(--t3); }
.word-count-error { font-size: 12px; color: var(--err); margin-top: 4px; }
.insights-generate-btn { align-self: flex-end; }

/* Generated content */
.gen-content {
  display: none;
}
.gen-content.visible { display: block; }

.gen-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.gen-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.gen-mode-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 12px; font-weight: 600;
}
.gen-mode-badge.brief { background: rgba(91,158,115,.12); color: var(--ok); }
.gen-mode-badge.detailed { background: rgba(78,127,170,.12); color: var(--blue-l); }
.gen-mode-badge.insights { background: var(--gold-bg); color: var(--gold-l); }
.gen-chapters { font-size: 12px; color: var(--t3); }
.gen-params { font-size: 12px; color: var(--t3); }

.gen-body {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 20px 24px;
  font-size: 14.5px; line-height: 1.75; color: var(--t1);
  min-height: 120px;
}
.gen-body h3 {
  font-family: 'Playfair Display', serif;
  font-size: 16px; color: var(--t1); margin: 16px 0 8px;
  border-bottom: 1px solid var(--border); padding-bottom: 6px;
}
.gen-body h3:first-child { margin-top: 0; }
.gen-body p { margin-bottom: 10px; }
.gen-body ul, .gen-body ol { padding-left: 20px; margin-bottom: 10px; }
.gen-body li { margin-bottom: 5px; }
.gen-body strong { color: var(--gold-l); font-weight: 600; }
.gen-body em { color: var(--t2); font-style: italic; }
.gen-body .cursor-blink {
  display: inline-block; width: 2px; height: 1em;
  background: var(--gold); margin-left: 2px; vertical-align: text-bottom;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.gen-actions {
  display: flex; align-items: center; gap: 10px; margin-top: 14px;
  flex-wrap: wrap;
}

/* History panel */
.history-panel {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r2); margin-top: 20px; overflow: hidden;
}
.history-panel-head {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--t3); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background .12s;
}
.history-panel-head:hover { background: var(--s3); }
.history-panel-body { display: none; }
.history-panel-body.open { display: block; }
.history-item {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: var(--s3); }
.history-item-left { flex: 1; min-width: 0; }
.history-item-mode {
  font-size: 12px; font-weight: 600; color: var(--t3); margin-bottom: 3px;
}
.history-item-preview {
  font-size: 13px; color: var(--t2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-item-time { font-size: 11px; color: var(--t3); white-space: nowrap; }

/* Generating skeleton in content */
.gen-skeleton { display: none; }
.gen-skeleton.visible { display: block; }
.gen-skeleton-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.gen-skeleton-body {
  background: var(--s2); border: 1px solid var(--border);

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'entering');
    s.style.display = 'none';
    s.style.opacity = '0';
  });
  const el = document.getElementById('screen-' + name);
  if (!el) return;
  el.style.display = 'flex';
  el.classList.add('active', 'entering');
  el.style.opacity = '1';
  state.screen = name;
  // Mobile toggle visibility
  const toggle = document.getElementById('mobile-outline-toggle');
  if (toggle) toggle.style.display = (name === 'detail') ? 'flex' : 'none';
}

/* ===================================================================
   F01 SEARCH
=================================================================== */
function handleSearchKeydown(e) {
  if (e.key === 'Enter') doSearch();
}
function quickSearch(q) {
  document.getElementById('home-search-input').value = q;
  doSearch();
}

function doSearch() {
  const q = document.getElementById('home-search-input').value.trim();
  if (!q) {
    showToast('请输入书名');
    return;
  }
  state.searchQuery = q;
  performSearch(q);
}

function performSearch(q) {
  showScreen('loading');
  document.getElementById('loading-text').textContent = `正在搜索"${q}"的网络资源…`;
  document.getElementById('loading-sub').textContent = '正在从多个来源获取图书信息';

  setTimeout(() => {
    // F02/F03: Simulate search results or AI fallback
    const matchIds = SEARCH_DB[q] || SEARCH_DB[q.toLowerCase()] || [];
    const exactResults = matchIds.map(id => BOOKS.find(b => b.id === id)).filter(Boolean);

    let results = exactResults;
    let isAI = false;
    if (exactResults.length === 0) {
      // F03: No results - use AI fallback (show all books as "similar")
      results = BOOKS.slice(0, 2);
      isAI = true;
    }
    state.searchResults = results;
    state.isAIFallback = isAI;
    renderResults(results, isAI, q);
    showScreen('results');
  }, 1400);
}

function renderResults(books, isAI, q) {
  // F03: AI notice
  const notice = document.getElementById('results-ai-notice');
  notice.style.display = isAI ? 'flex' : 'none';

  // F02: Meta info
  const meta = document.getElementById('results-meta');
  meta.innerHTML = isAI
    ? `未找到"<strong>${q}</strong>"的精确网络资源，以下为 AI 关联推荐`
    : `找到 <strong>${books.length}</strong> 条关于"<strong>${q}</strong>"的结果`;

  // F02: Results list
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  books.forEach(book => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-cover" style="background:${book.color}">${book.title[0]}</div>
      <div class="result-info">
        <div class="result-title">${book.title}</div>
        <div class="result-author">${book.author} · ${book.year}</div>
        <div class="result-desc">${book.description}</div>
        <div class="result-tags">
          <span class="tag cat">${book.category}</span>
          ${isAI ? '<span class="tag ai">AI 关联</span>' : ''}
        </div>
      </div>
    `;
    card.onclick = () => openBook(book);
    list.appendChild(card);
  });
}

/* ===================================================================
   F04/F05/F06 BOOK DETAIL & OUTLINE
=================================================================== */
function openBook(book) {
  state.selectedBook = book;
  state.selectedChapters = new Set();
  state.outlineReady = false;
  state.generatedContent = '';
  state.expandedChapters = new Set();

  // Update topbar
  document.getElementById('detail-topbar-title').textContent = book.title;

  // Sidebar book info
  document.getElementById('sb-cover').style.background = book.color;
  document.getElementById('sb-cover').textContent = book.title[0];
  document.getElementById('sb-title').textContent = book.title;
  document.getElementById('sb-author').textContent = book.author;
  document.getElementById('select-count').style.display = 'none';

  // Reset content area
  resetContentArea();

  // F06: Check if outline is cached
  const cached = localStorage.getItem('zhidu_outline_' + book.id);
  if (cached) {
    // Load from "database" immediately
    showScreen('detail');
    state.outlineReady = true;
    renderOutline(book.outline);
    loadHistoryContent(book);
  } else {
    // F04: Generate outline
    showScreen('detail');
    document.getElementById('outline-skel').style.display = 'flex';
    document.getElementById('outline-nodes').innerHTML = '';
    setTimeout(() => {
      state.outlineReady = true;
      localStorage.setItem('zhidu_outline_' + book.id, JSON.stringify(book.outline));
      document.getElementById('outline-skel').style.display = 'none';
      renderOutline(book.outline);
      loadHistoryContent(book);
    }, 1800);
  }

  // F21/F22: Add to history
  addToHistory(book);
}

// F05: Render outline tree
function renderOutline(outline) {
  const container = document.getElementById('outline-nodes');
  container.innerHTML = '';

  outline.forEach(chapter => {
    // Chapter row
    const chRow = createChapterRow(chapter, false);
    container.appendChild(chRow);

    if (chapter.children && chapter.children.length > 0) {
      const childContainer = document.createElement('div');
      childContainer.className = 'ch-children';
      childContainer.id = 'ch-children-' + chapter.id;

      chapter.children.forEach(section => {
        const secRow = createChapterRow(section, true);
        childContainer.appendChild(secRow);
      });
      container.appendChild(childContainer);
    }
  });
}

function createChapterRow(node, isSection) {
  const row = document.createElement('div');
  row.className = 'ch-row' + (isSection ? '' : ' chapter');
  row.id = 'ch-row-' + node.id;

  const hasChildren = !isSection && node.children && node.children.length > 0;

  row.innerHTML = `
    <span class="ch-expand ${hasChildren ? '' : 'leaf'}" id="expand-${node.id}">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </span>
    <span class="ch-checkbox" id="cb-${node.id}" onclick="toggleCheck(event, '${node.id}', ${isSection})"></span>
    <span class="ch-title">${node.title}</span>
  `;

  if (hasChildren) {
    row.querySelector('.ch-expand').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleExpand(node.id);
    });
  }

  row.addEventListener('click', (e) => {
    if (e.target.closest('.ch-checkbox') || e.target.closest('.ch-expand')) return;
    // Click row = select this node
    toggleCheck(e, node.id, isSection, true);
  });

  return row;
}

function toggleExpand(chapterId) {
  const children = document.getElementById('ch-children-' + chapterId);
  const expand = document.getElementById('expand-' + chapterId);
  if (!children) return;
  const isOpen = children.classList.contains('open');
  if (isOpen) {
    children.classList.remove('open');
    expand.classList.remove('open');
    state.expandedChapters.delete(chapterId);
  } else {
    children.classList.add('open');
    expand.classList.add('open');
    state.expandedChapters.add(chapterId);
  }
}

// F07/F08: Chapter selection
function toggleCheck(e, nodeId, isSection, fromRowClick = false) {
  if (e) e.stopPropagation();
  const already = state.selectedChapters.has(nodeId);
  if (already) {
    state.selectedChapters.delete(nodeId);
  } else {
    state.selectedChapters.add(nodeId);
    // If clicking a chapter row (not section), also auto-expand
    if (!isSection) toggleExpand(nodeId);
  }
  updateCheckboxUI();
  updateSelectCount();
}

function updateCheckboxUI() {
  state.selectedBook.outline.forEach(ch => {
    const cb = document.getElementById('cb-' + ch.id);
    const row = document.getElementById('ch-row-' + ch.id);
    if (!cb) return;

    const chSelected = state.selectedChapters.has(ch.id);
    const childIds = (ch.children || []).map(s => s.id);
    const selectedChildren = childIds.filter(id => state.selectedChapters.has(id));

    if (chSelected) {
      cb.className = 'ch-checkbox checked';
      cb.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0E0C0B" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
      row.classList.add('selected');
    } else if (selectedChildren.length > 0) {
      cb.className = 'ch-checkbox indeterminate';
      cb.innerHTML = `<div style="width:8px;height:2px;background:var(--gold);border-radius:1px"></div>`;
      row.classList.remove('selected');
    } else {
      cb.className = 'ch-checkbox';
      cb.innerHTML = '';
      row.classList.remove('selected');
    }

    (ch.children || []).forEach(sec => {
      const scb = document.getElementById('cb-' + sec.id);
      const srow = document.getElementById('ch-row-' + sec.id);
      if (!scb) return;
      const sel = state.selectedChapters.has(sec.id);
      scb.className = 'ch-checkbox' + (sel ? ' checked' : '');
      scb.innerHTML = sel ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0E0C0B" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : '';
      if (srow) sel ? srow.classList.add('selected') : srow.classList.remove('selected');
    });
  });
}

function updateSelectCount() {
  const count = state.selectedChapters.size;
  const el = document.getElementById('select-count');
  if (count > 0) {
    el.style.display = 'inline-flex';
    el.textContent = `已选 ${count} 项`;
  } else {
    el.style.display = 'none';
  }
}

/* ===================================================================
   CONTENT AREA RESET & TAB SWITCHING
=================================================================== */
function resetContentArea() {
  document.getElementById('content-empty').style.display = 'flex';
  document.getElementById('content-empty').style.flexDirection = 'column';
  document.getElementById('gen-skeleton').classList.remove('visible');
  document.getElementById('gen-content').classList.remove('visible');
  document.getElementById('insights-panel').classList.remove('visible');
  document.getElementById('history-panel').style.display = 'none';
  document.getElementById('btn-copy').style.display = 'none';
  document.getElementById('btn-regen').style.display = 'none';
  state.generatedContent = '';
  switchTab('brief');
}

// F09/F10/F13: Tab switching
function switchTab(mode) {
  ['brief', 'detailed', 'insights'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('active', m === mode);
  });
  state.outputMode = mode;

  // Show/hide insights panel
  const panel = document.getElementById('insights-panel');
  if (mode === 'insights') {
    panel.classList.add('visible');
  } else {
    panel.classList.remove('visible');
  }

  // If we have content and mode changes, clear content display
  if (state.generatedContent) {
    document.getElementById('gen-content').classList.remove('visible');
    document.getElementById('content-empty').style.display = 'flex';
    document.getElementById('btn-copy').style.display = 'none';
    document.getElementById('btn-regen').style.display = 'none';
    state.generatedContent = '';
  }

  // Auto generate if not insights and chapters selected
  if (mode !== 'insights' && state.selectedChapters.size > 0) {
    generateContent();
  }
}

/* ===================================================================
   F09/F10/F11/F16 CONTENT GENERATION (with F19 streaming)
=================================================================== */
function generateContent() {
  if (state.selectedChapters.size === 0) {
    showToast('请先在左侧选择章节');
    return;
  }
  if (state.isGenerating) return;

  // F15: Validate word count for insights
  if (state.outputMode === 'insights') {
    const wc = parseInt(document.getElementById('word-count').value);
    if (isNaN(wc) || wc < 100 || wc > 3000) {
      document.getElementById('wc-error').style.display = 'block';
      return;
    }
    document.getElementById('wc-error').style.display = 'none';
    state.insightWordCount = wc;
  }

  state.isGenerating = true;

  // Hide empty state, show skeleton
  document.getElementById('content-empty').style.display = 'none';
  document.getElementById('gen-content').classList.remove('visible');
  document.getElementById('gen-skeleton').classList.add('visible');
  document.getElementById('btn-copy').style.display = 'none';
  document.getElementById('btn-regen').style.display = 'none';

  const delay = state.outputMode === 'detailed' ? 2200 : 1500;

  setTimeout(() => {
    document.getElementById('gen-skeleton').classList.remove('visible');
    const content = buildContent();
    streamContent(content);
  }, delay);
}

function buildContent() {
  const book = state.selectedBook;
  const mode = state.outputMode;
  const selectedIds = Array.from(state.selectedChapters);

  // Get all nodes (chapters + sections)
  const allNodes = [];
  book.outline.forEach(ch => {
    allNodes.push(ch);
    (ch.children || []).forEach(sec => allNodes.push(sec));
  });

  const selectedNodes = allNodes.filter(n => selectedIds.includes(n.id));

  if (mode === 'insights') {
    // F16: Knowledge insights
    const style = state.insightStyleCustom || state.insightStyle;
    return CONTENT_MOCK.insights.template(selectedNodes, style, state.insightWordCount);
  }

  // F09/F10/F11: Brief or detailed
  const contentLib = mode === 'brief' ? CONTENT_MOCK.brief : CONTENT_MOCK.detailed;
  const parts = [];

  // F11: Multi-chapter combined output
  selectedNodes.forEach(node => {
    const content = contentLib[node.id];
    if (content) {
      parts.push(content);
    } else {
      // Fallback content
      parts.push(`### ${node.title}\n\n${mode === 'brief'
        ? `本章节的核心要点：\n\n- **核心概念**：${node.title} 探讨了该领域中的重要理论与实践方法\n- **关键启示**：通过对比分析，作者揭示了常见误区并提供了改进路径\n- **应用价值**：这些内容在实际工作与学习中具有直接的指导意义`
        : `本章围绕 **${node.title}** 展开详细论述。\n\n作者从历史演进的角度切入，系统梳理了该主题的理论脉络。核心论点建立在扎实的实证研究基础上，通过多个典型案例阐释了理论框架的适用范围。\n\n读者在理解这一章时，需要特别注意核心概念之间的关联结构，以及作者如何在不同情境中运用同一分析工具解决差异化的问题。这种方法论的统一性，是本书最具价值的地方之一。`
      }`);
    }
  });

  return parts.join('\n\n---\n\n');
}

// F19: Streaming typewriter effect
function streamContent(rawText) {
  const book = state.selectedBook;
  const mode = state.outputMode;
  const selectedIds = Array.from(state.selectedChapters);

  // Set header info
  const modeBadge = document.getElementById('gen-mode-badge');
  const modeLabels = { brief: '缩略内容', detailed: '详细内容', insights: '知识心得' };
  const modeClasses = { brief: 'brief', detailed: 'detailed', insights: 'insights' };
  modeBadge.textContent = modeLabels[mode];
  modeBadge.className = 'gen-mode-badge ' + modeClasses[mode];

  // Chapter label
  const allNodes = [];
  book.outline.forEach(ch => {
    allNodes.push(ch);
    (ch.children || []).forEach(sec => allNodes.push(sec));
  });
  const selNodes = allNodes.filter(n => selectedIds.includes(n.id));
  document.getElementById('gen-chapters-label').textContent =
    selNodes.length === 1 ? selNodes[0].title : `${selNodes.length} 个章节`;

  // Params label (insights mode)
  const params = document.getElementById('gen-params-label');
  if (mode === 'insights') {
    params.textContent = `${state.insightStyleCustom || state.insightStyle} · ${state.insightWordCount}字`;
  } else {
    params.textContent = '';
  }

  document.getElementById('gen-content').classList.add('visible');
  const bodyEl = document.getElementById('gen-body');
  bodyEl.innerHTML = '<span class="cursor-blink"></span>';

  // Simple markdown → HTML (basic)
  const lines = rawText.split('\n');
  let htmlParts = [];
  let i = 0;

  function processLine(line) {
    if (line.startsWith('### ')) return `<h3>${mdInline(line.slice(4))}</h3>`;
    if (line.startsWith('## '))  return `<h3>${mdInline(line.slice(3))}</h3>`;
    if (line.startsWith('# '))   return `<h3>${mdInline(line.slice(2))}</h3>`;
    if (line.startsWith('- '))   return `<li>${mdInline(line.slice(2))}</li>`;
    if (line.match(/^\d+\. /))   return `<li>${mdInline(line.replace(/^\d+\. /, ''))}</li>`;
    if (line === '---') return '<hr style="border-color:var(--border);margin:16px 0">';
    if (line === '') return '';
    return `<p>${mdInline(line)}</p>`;
  }

  function mdInline(t) {
    return t
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code style="background:var(--s3);padding:1px 5px;border-radius:3px;font-size:.9em">$1</code>');
  }

  let htmlResult = lines.map(processLine).join('\n');
  // Wrap consecutive <li> in <ul>
  htmlResult = htmlResult.replace(/((<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Stream character by character
  const fullHTML = htmlResult;
  let displayHTML = '';
  const words = fullHTML.split(/(?<=[ >])/); // split by word boundaries
  let wordIdx = 0;

  function streamNext() {
    if (wordIdx >= words.length) {
      // Done
      bodyEl.innerHTML = displayHTML;
      state.isGenerating = false;
      state.generatedContent = rawText;
      state.generatedRawText = rawText;
      document.getElementById('btn-copy').style.display = 'inline-flex';
      document.getElementById('btn-regen').style.display = 'inline-flex';
      // F22: Save to history
      saveGenerationHistory(rawText);
      renderHistoryPanel();
      return;
    }
    const chunk = words.slice(wordIdx, wordIdx + 3).join('');
    displayHTML += chunk;
    wordIdx += 3;
    bodyEl.innerHTML = displayHTML + '<span class="cursor-blink"></span>';
    const speed = Math.random() * 12 + 6;
    setTimeout(streamNext, speed);
  }

  streamNext();
}

/* ===================================================================
   F14/F15 INSIGHTS PARAMS
=================================================================== */
function selectStyle(el, style) {
  document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  state.insightStyle = style;
  state.insightStyleCustom = '';
  document.getElementById('style-custom').value = '';
}

function onCustomStyleInput(el) {
  state.insightStyleCustom = el.value;
  if (el.value) {
    document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
  }
}

function validateWordCount(el) {
  const v = parseInt(el.value);
  const errEl = document.getElementById('wc-error');
  if (isNaN(v) || v < 100 || v > 3000) {
    errEl.style.display = 'block';
  } else {
    errEl.style.display = 'none';
    state.insightWordCount = v;
  }
}

/* ===================================================================
   F12/F17 REGENERATE
=================================================================== */
function regenerate() {
  if (state.isGenerating) return;
  state.generatedContent = '';
  generateContent();
}

/* ===================================================================
   F18 COPY
=================================================================== */
function copyContent() {
  if (!state.generatedRawText && !state.generatedContent) {
    showToast('暂无内容可复制');
    return;
  }
  const text = state.generatedRawText || state.generatedContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ 已复制到剪贴板（Markdown 格式）');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 已复制到剪贴板');
  });
}

/* ===================================================================
   F21/F22/F23 PERSISTENCE
=================================================================== */
function addToHistory(book) {
  let books = state.historyBooks.filter(b => b.id !== book.id);
  books.unshift({ id: book.id, title: book.title, author: book.author, color: book.color, category: book.category, lastAccess: Date.now() });
  books = books.slice(0, 12); // max 12
  state.historyBooks = books;
  localStorage.setItem('zhidu_books', JSON.stringify(books));
  renderHistoryGrid();
}

function renderHistoryGrid() {
  const grid = document.getElementById('history-grid');
  if (!grid) return;
  const books = state.historyBooks;
  if (books.length === 0) {
    grid.innerHTML = '<div class="history-empty">暂无阅读记录，搜索一本书开始吧</div>';
    return;
  }
  grid.innerHTML = books.map(b => `
    <div class="history-card" onclick="openHistoryBook('${b.id}')">
      <div class="history-card-cover" style="background:${b.color}">${b.title[0]}</div>
      <div class="history-card-title">${b.title}</div>
      <div class="history-card-meta">${b.category} · ${timeAgo(b.lastAccess)}</div>
    </div>
  `).join('');
}

function openHistoryBook(bookId) {
  const book = BOOKS.find(b => b.id === bookId);
  if (book) openBook(book);
}

function saveGenerationHistory(content) {
  const book = state.selectedBook;
  const key = book.id;
  const history = state.generationHistory[key] || [];
  history.unshift({
    mode: state.outputMode,
    style: state.outputMode === 'insights' ? (state.insightStyleCustom || state.insightStyle) : null,
    wordCount: state.outputMode === 'insights' ? state.insightWordCount : null,
    chapters: Array.from(state.selectedChapters),
    content: content,
    time: Date.now(),
  });
  state.generationHistory[key] = history.slice(0, 20);
  localStorage.setItem('zhidu_gen_history', JSON.stringify(state.generationHistory));
}

function loadHistoryContent(book) {
  const history = state.generationHistory[book.id];
  if (history && history.length > 0) {
    renderHistoryPanel();
  }
}

function renderHistoryPanel() {
  const book = state.selectedBook;
  const history = (state.generationHistory[book.id] || []);
  const panel = document.getElementById('history-panel');
  const body = document.getElementById('history-panel-body');

  if (history.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  const modeLabels = { brief: '缩略内容', detailed: '详细内容', insights: '知识心得' };

  body.innerHTML = history.slice(0, 8).map((h, i) => {
    const modeLabel = modeLabels[h.mode] || h.mode;
    const params = h.style ? ` · ${h.style} · ${h.wordCount}字` : '';
    const preview = h.content.replace(/[#*\-_`]/g, '').slice(0, 60) + '…';
    return `
      <div class="history-item" onclick="loadHistoryItem(${i})">
        <div class="history-item-left">
          <div class="history-item-mode">${modeLabel}${params}</div>
          <div class="history-item-preview">${preview}</div>
        </div>
        <div class="history-item-time">${timeAgo(h.time)}</div>
      </div>
    `;
  }).join('');
}

function loadHistoryItem(index) {
  const book = state.selectedBook;
  const history = state.generationHistory[book.id] || [];
  const item = history[index];
  if (!item) return;

  state.generatedContent = item.content;
  state.generatedRawText = item.content;
  state.outputMode = item.mode;

  // Restore selected chapters
  state.selectedChapters = new Set(item.chapters);
  updateCheckboxUI();
  updateSelectCount();

  // Switch tab
  ['brief', 'detailed', 'insights'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('active', m === item.mode);
  });

  // Show insights panel if needed
  document.getElementById('insights-panel').classList.toggle('visible', item.mode === 'insights');

  // Stream the content
  document.getElementById('content-empty').style.display = 'none';
  document.getElementById('gen-skeleton').classList.remove('visible');
  streamContent(item.content);
  showToast('已加载历史记录');
}

function toggleHistoryPanel() {
  const body = document.getElementById('history-panel-body');
  const chevron = document.getElementById('history-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.style.transform = !isOpen ? 'rotate(180deg)' : '';
}

/* ===================================================================
   F25 MOBILE SIDEBAR
=================================================================== */
function openMobileSidebar() {
  document.getElementById('outline-sidebar').classList.add('mobile-open');
  document.getElementById('sidebar-overlay').classList.add('visible');
}
function closeMobileSidebar() {
  document.getElementById('outline-sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

/* ===================================================================
   UTILITIES
=================================================================== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
  return Math.floor(diff / 86400000) + ' 天前';
}

/* ===================================================================
   INIT
=================================================================== */
(function init() {
  showScreen('home');
  renderHistoryGrid();

  // Mobile outline: auto-close on content click
  document.getElementById('content-main').addEventListener('click', () => {
    if (window.innerWidth <= 768) closeMobileSidebar();
  });

  // Tab: auto-generate when chapters already selected and tab changes
  // (handled in switchTab)
})();
</script>
